name: DungeonRift
version: 1.0.0
main: com.dungeonrift.DungeonRift
api-version: '1.21'
description: Extraction-style dungeon instances with portal exit and 30-minute timer
authors: [ YourTeam ]

depend:
  - Multiverse-Core
  - FastAsyncWorldEdit

commands:
  dungeon:
    description: Admin dungeon management
    usage: /dungeon <set|list|status|reload>
    permission: dungeonrift.admin
  rift:
    description: Player commands
    usage: /rift <queue|leave|party>
    permission: dungeonrift.player

permissions:
  dungeonrift.admin:
    description: Full admin access
    default: op
  dungeonrift.player:
    description: Player queue and party access
    default: true
