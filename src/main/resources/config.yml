# ─────────────────────────────────────────
#  DungeonRift  –  config.yml
# ─────────────────────────────────────────

# Folder inside /plugins/DungeonRift/ that holds template world folders
templates-directory: templates

# Name of the template folder currently active (swap this for weekly rotation)
# Command: /dungeon set <name>
active-template: dungeon_week1

# Hub world name (must already exist in Multiverse)
hub-world: world_hub

# Spawn location in the hub world (x, y, z, yaw, pitch)
hub-spawn:
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# ── Instance settings ──────────────────────────────────────────────────────────
instance:
  # Minutes before the world self-destructs
  time-limit-minutes: 30

  # Warning broadcasts at these minutes remaining
  warnings-at-minutes: [ 10, 5, 2, 1 ]

  # Seconds a player must stand in the extraction zone to extract
  extraction-hold-seconds: 10

  # Radius (blocks) around the extraction portal that counts as the zone
  extraction-zone-radius: 3

  # Where in the template world the extraction portal is located
  extraction-portal:
    x: 0
    y: 64
    z: 0

  # Where players spawn inside the instance world
  instance-spawn:
    x: 0.5
    y: 65.0
    z: 0.5
    yaw: 0.0
    pitch: 0.0

# ── Party settings ──────────────────────────────────────────────────────────────
party:
  max-size: 4
  # Seconds the party leader has to ready up before the queue invite expires
  invite-expiry-seconds: 60

# ── Loot / penalty settings ────────────────────────────────────────────────────
loot:
  # true  → players enter with empty inventory (pure extraction)
  # false → players keep whatever they brought in
  clear-on-enter: true

  # What happens to inventory on death inside an instance
  # options: drop_in_world | clear | keep
  death-penalty: drop_in_world

# ── Messages (supports & colour codes) ────────────────────────────────────────
messages:
  prefix: "&8[&6DungeonRift&8] &r"
  queued-solo: "&aYou have joined the solo queue."
  instance-starting: "&6The dungeon awaits. Prepare yourself."
  extraction-start: "&eStep into the light... &7({seconds}s)"
  extraction-interrupted: "&cExtraction interrupted!"
  extracted: "&aYou escaped with your loot!"
  death-message: "&cYou died in the dungeon. Your loot is lost."
  timer-warning: "&c{minutes} minute(s) remaining!"
  timer-expired: "&4The dungeon collapses around you..."
